<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EduSavvy — AI Learning Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
    <nav class="nav" id="nav" style="display:none">
        <div class="nav-brand" onclick="nav('dashboard')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#E8A020" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Edu<span>Savvy</span>
        </div>
        <div class="nav-links" id="navLinks"></div>
        <div class="nav-user">
            <span class="nav-nm" id="navNm"></span>
            <div class="av-wrap">
                <div class="av" id="avBtn" onclick="toggleMenu()"><span id="avInit"></span></div>
                <div class="av-menu" id="avMenu" style="display:none">
                    <div class="av-head">
                        <div class="fw7 sm" id="mName"></div>
                        <div class="xs cg" id="mSchool"></div>
                        <div class="xs cg" id="mGrade"></div>
                    </div>
                    <div class="av-item" onclick="openProfile();closeMenu()">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                        </svg>Edit profile
                    </div>
                    <div class="av-item" onclick="nav('timetable');closeMenu()">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>My timetable
                    </div>
                    <div class="av-item danger" onclick="logout()">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>Sign out
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <div id="app"></div>
    <script src="script.js"></script>
</body>
</html>
